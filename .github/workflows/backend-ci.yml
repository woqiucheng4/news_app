name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/15
      SECRET_KEY: ci-secret-key-please-change
      OPENAI_API_KEY: ci-openai-key
      DEBUG: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax-check seed scripts
        run: |
          python -m py_compile scripts/seed_sources.py
          python -m py_compile scripts/seed_topics.py
          python -m py_compile scripts/seed_demo_user_and_subscriptions.py
          python -m py_compile scripts/seed_demo_articles.py
          python -m py_compile scripts/seed_demo_all.py

      - name: Run subscription/api regression tests
        run: |
          pytest -q tests/test_user_subscription_api.py tests/test_api_endpoints.py

      - name: Run full backend test suite
        run: pytest -q
