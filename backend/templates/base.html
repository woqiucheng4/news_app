<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --border: #e5e7eb;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
    }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .nav .brand {
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
    }
    .nav-links a.active {
      color: var(--accent);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 8px 0;
      line-height: 1.4;
    }
    .title a {
      color: inherit;
      text-decoration: none;
    }
    .title a:hover {
      color: var(--accent);
    }
    .summary {
      margin: 8px 0 0 0;
      line-height: 1.6;
    }
    .filters {
      margin-bottom: 12px;
    }
    .filters a {
      display: inline-block;
      margin: 0 8px 8px 0;
      font-size: 13px;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 10px;
      background: #fff;
    }
    .filters a.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }
    @media (max-width: 680px) {
      .title { font-size: 16px; }
      .container { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a class="brand" href="/web/feed">NewsFlow</a>
      <div class="nav-links">
        <a href="/web/feed" class="{% if active_page == 'feed' %}active{% endif %}">Feed</a>
        <a href="/web/hot" class="{% if active_page == 'hot' %}active{% endif %}">Hot</a>
        <a href="/web/analytics" class="{% if active_page == 'analytics' %}active{% endif %}">Analytics</a>
      </div>
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
