services:
  # Application
  api:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             python scripts/seed_sources.py &&
             python scripts/seed_topics.py &&
             if [ \"${ENABLE_DEMO_SEED:-false}\" = \"true\" ]; then python scripts/seed_demo_all.py; else echo 'Skip demo seed (ENABLE_DEMO_SEED=false)'; fi &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/newflow
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-me}
      - DEBUG=true
      - ENABLE_DEMO_SEED=${ENABLE_DEMO_SEED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    restart: unless-stopped

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=newflow
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # Celery Worker (Optional)
  celery-worker:
    build: .
    command: celery -A core.tasks worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/newflow
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - USE_CELERY=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis
      - postgres
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
      replicas: 0  # Set to 1+ to enable
    restart: unless-stopped

  # Celery Beat (Optional)
  celery-beat:
    build: .
    command: celery -A core.tasks beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/newflow
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - USE_CELERY=true
    depends_on:
      - redis
      - postgres
    deploy:
      replicas: 0  # Set to 1 to enable
    restart: unless-stopped

  # Flower - Celery Monitoring (Optional)
  flower:
    build: .
    command: celery -A core.tasks flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - redis
    deploy:
      replicas: 0  # Set to 1 to enable
    restart: unless-stopped

  # Nginx - Load Balancer (Production)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    deploy:
      replicas: 0  # Set to 1+ for production
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  uploads:
