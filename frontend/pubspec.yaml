name: newsflow_frontend
description: NewsFlow Flutter client application.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dio: ^5.9.0
  flutter_riverpod: ^3.0.3
  go_router: ^17.1.0
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  firebase_core: ^3.15.2
  firebase_analytics: ^11.6.0
  firebase_messaging: ^15.2.10
  url_launcher: ^6.3.1
  in_app_purchase: ^3.2.3
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
